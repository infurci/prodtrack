# ─────────────────────────────────────────────────────────
# Nginx config for PRODTRACK
# Install to: /etc/nginx/sites-available/prodtrack
# Then enable it (see DEPLOY.md).
#
# NOTE: certbot (which you already ran in Phase 7) will edit this
# file automatically to add the SSL certificate lines and the
# HTTP->HTTPS redirect. Start with this HTTP-only version; certbot
# upgrades it. If your domain already has a cert from Phase 7,
# see DEPLOY.md step 7 for how to reconcile.
# ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name prodtrack.infurci.com;

    # Forward everything to the Node app running on 127.0.0.1:3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reasonable upload size for future document/media attachments
    client_max_body_size 10M;
}
